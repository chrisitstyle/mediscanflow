spring:
  application:
    name: medical-platform-service

  datasource:
    url: jdbc:postgresql://localhost:5432/mediscanflow
    username: mediscanflow
    password: mediscanflow

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    enabled: true

  rabbitmq:
    host: localhost
    port: 5672
    username: mediscanflow
    password: mediscanflow

server:
  port: 8080
  servlet:
    context-path: /api

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  storage:
    minio:
      endpoint: http://localhost:9000
      public-endpoint: http://localhost:9000
      access-key: mediscanflow
      secret-key: mediscanflow123
      bucket: medical-scans